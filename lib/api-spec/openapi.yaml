components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # PUSH NOTIFICATIONS
    PushTokenInput:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Expo push token (ExponentPushToken[...])
        platform:
          type: string
          enum: [ios, android]

    PushTokenUnregisterInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    # AUTH
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    RegisterInput:
      type: object
      required: [email, password, name, companyName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        companyName:
          type: string
        industry:
          type: ["string", "null"]
        country:
          type: ["string", "null"]

    AuthResponse:
      type: object
      required: [token, user]
