          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        permissions:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        contactVisibility:
          type: string
          enum: [own, selected, all]
        companyVisibility:
          type: string
          enum: [own, selected, all]
        accessibleCompanies:
          type: array
          items:
            type: integer
        isActive:
          type: boolean
        lastLoginAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    UserList:
      type: object
      required: [users, total, page, limit]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    UserInput:
